name: Keep Supabase Alive

on:
  schedule:
    # Chạy mỗi 3 ngày lúc 7:00 AM UTC (14:00 giờ VN)
    - cron: '0 7 */3 * *'
  workflow_dispatch: # Cho phép chạy thủ công từ GitHub UI

jobs:
  ping:
    name: Ping Supabase Database
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Supabase REST API
        id: ping
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/school_settings?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            --max-time 30)
          echo "HTTP Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ne 200 ] && [ "$HTTP_STATUS" -ne 206 ]; then
            echo "::warning::Unexpected HTTP status $HTTP_STATUS from Supabase"
          else
            echo "✅ Supabase is alive and healthy"
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Log timestamp
        run: |
          echo "🕒 Pinged at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "📅 Next ping in ~3 days"
